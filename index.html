    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .number-grid {
            grid-template-columns: repeat(5, 1fr);
        }
        @media (min-width: 640px) {
            .number-grid {
                grid-template-columns: repeat(10, 1fr);
            }
        }
        .number-button {
            min-height: 44px;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulse-glow {
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.8); }
            100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        }
        .file-input {
            display: none;
        }
        .file-label {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-label:hover {
            transform: scale(1.05);
        }
        .responsive-grid {
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
        }
        .responsive-button {
            min-width: 60px;
            min-height: 60px;
            font-size: 0.875rem;
        }
        @media (max-width: 380px) {
            .responsive-button {
                min-width: 50px;
                min-height: 50px;
                font-size: 0.75rem;
            }
        }
        .form-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        @media (min-width: 640px) {
            .form-buttons {
                flex-direction: row;
            }
        }
        .required-field::after {
            content: " *";
            color: #ef4444;
        }
        .expired-reservation {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52) !important;
            border-color: #dc2626 !important;
            animation: pulse-expired 2s infinite;
        }
        @keyframes pulse-expired {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        .pending-verification {
            background: linear-gradient(45deg, #f59e0b, #d97706) !important;
            border-color: #f59e0b !important;
            animation: pulse-pending 2s infinite;
        }
        @keyframes pulse-pending {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        /* ── Toast notifications ── */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 340px;
            width: calc(100vw - 2rem);
        }
        .toast {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: toastIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            word-break: break-word;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(100%); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .toast-success { background: #065f46; border: 1px solid #10b981; color: #d1fae5; }
        .toast-error   { background: #7f1d1d; border: 1px solid #ef4444; color: #fee2e2; }
        .toast-info    { background: #1e3a5f; border: 1px solid #3b82f6; color: #dbeafe; }
        .toast-warning { background: #78350f; border: 1px solid #f59e0b; color: #fef3c7; }

        /* ── Loading spinner ── */
        .spinner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 0, 60, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9998;
        }
        .spinner {
            width: 56px;
            height: 56px;
            border: 5px solid rgba(255,255,255,0.15);
            border-top-color: #a78bfa;
            border-radius: 50%;

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Validación ── */
        input:invalid:not(:placeholder-shown),
        select:invalid:not([value=""]) {
            border-color: #ef4444 !important;

        input.valid-phone { border-color: #10b981 !important; }

        /* ── Modal scroll fix para pantallas pequeñas ── */
        .modal-scroll {

<body class="bg-gradient-to-br from-purple-900 via-purple-800 to-indigo-900 min-h-screen">
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { jsPDF } = window.jspdf;

        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAGC_fsHfnguY4m0o2OE3SLSanDGk39zbM",
            authDomain: "rifa-franklin.firebaseapp.com",
            projectId: "rifa-franklin",
            storageBucket: "rifa-franklin.firebasestorage.app",
            messagingSenderId: "451592144799",
            appId: "1:451592144799:web:7ea7a0e85a6579f8b69faa",
            measurementId: "G-Q4XVNYKVWB"
        };

        // Inicializar Firebase solo una vez
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        function TalonarioRifa() {
            const [selectedNumbers, setSelectedNumbers] = useState(new Set());
            const [soldNumbers, setSoldNumbers] = useState(new Set());
            const [showTicket, setShowTicket] = useState(false);
            const [currentTicket, setCurrentTicket] = useState(null);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({
                nombre: '',
                apellido: '',
                telefono: '',
                email: '',
                metodoPago: '',
                comprobanteFile: null
            });
            const [ticketData, setTicketData] = useState({});
            const [pendingNumbers, setPendingNumbers] = useState(new Set());
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [lastSale, setLastSale] = useState(null);
            const [syncStatus, setSyncStatus] = useState('🟡 Conectando...');
            const [reservedNumbers, setReservedNumbers] = useState(new Set());
            const [showDrawPanel, setShowDrawPanel] = useState(false);
            const [winnerNumber, setWinnerNumber] = useState(null);
            const [drawExecuted, setDrawExecuted] = useState(false);
            const [ticketCounter, setTicketCounter] = useState(1);
            const [isUploading, setIsUploading] = useState(false);
            const [showUpdatePaymentModal, setShowUpdatePaymentModal] = useState(false);
            const [selectedReservedNumber, setSelectedReservedNumber] = useState(null);
            const [updatePaymentData, setUpdatePaymentData] = useState({
                metodoPago: '',
                comprobanteFile: null
            });
            const [paymentConfirmed, setPaymentConfirmed] = useState(false);
            const [showClearDataModal, setShowClearDataModal] = useState(false);
            const [clearDataConfirmation, setClearDataConfirmation] = useState('');
            const [showSearchTicketModal, setShowSearchTicketModal] = useState(false);
            const [searchPhone, setSearchPhone] = useState('');
            const [foundTickets, setFoundTickets] = useState([]);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [appSettings, setAppSettings] = useState({
                fechaSorteo: '23 de Diciembre',
                loteria: 'Chance Pick 3 Noche',
                precioNumero: 25000,
                fechaLimitePago: new Date(2024, 11, 23, 12, 0, 0).getTime()
            });
            const [expiredReservations, setExpiredReservations] = useState(new Set());
            const [pendingVerificationNumbers, setPendingVerificationNumbers] = useState(new Set());
            const [showPaymentInstructions, setShowPaymentInstructions] = useState(false);
            const [currentPaymentData, setCurrentPaymentData] = useState({
                metodoPago: '',
                numeros: [],
                total: 0,
                isUpdate: false
            });
            // NUEVO: sistema de toast en lugar de alert()
            const [toasts, setToasts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // Helper: mostrar toast en lugar de alert
            const showToast = (message, type = 'info', duration = 4000) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), duration);
            };

            const confirmAction = (message) => window.confirm(message);

            const ADMIN_PASSWORD_HASH = btoa("Franklin2024"); // ofuscación básica
            const db = firebase.firestore();
            const storage = firebase.storage();

            // Función para abrir apps de pago
            const openPaymentApp = (metodoPago, total) => {
                let appUrl = '';
                let fallbackUrl = '';
                
                switch(metodoPago) {
                    case 'nequi':
                        appUrl = "nequi://pago?telefono=3197118858&monto=" + total;
                        fallbackUrl = "https://api.whatsapp.com/send?phone=573197118858&text=" + 
                            encodeURIComponent(`Hola Franklin, quiero pagar mi boleta de rifa por Nequi. Monto: $${total}`);
                        break;
                        
                    case 'bancolombia':
                        appUrl = "bancolombia://transfer?codigo=31172084632&monto=" + total;
                        fallbackUrl = "https://api.whatsapp.com/send?phone=573197118858&text=" + 
                            encodeURIComponent(`Hola Franklin, quiero pagar mi boleta de rifa por Bancolombia. Monto: $${total}`);
                        break;
                        
                    case 'efectivo':
                        appUrl = "https://api.whatsapp.com/send?phone=573197118858&text=" + 
                            encodeURIComponent(`Hola Franklin, quiero coordinar pago en efectivo para mi boleta de rifa. Monto: $${total}`);
                        break;
                        
                    case 'transferencia':
                        appUrl = "https://api.whatsapp.com/send?phone=573197118858&text=" + 
                            encodeURIComponent(`Hola Franklin, quiero realizar transferencia para mi boleta de rifa. Monto: $${total}`);
                        break;
                        
                    default:
                        return false;
                }
                
                // Intentar abrir la app nativa
                window.location.href = appUrl;
                
                // Si no se abre la app, redirigir a WhatsApp después de un tiempo
                setTimeout(() => {
                    if (!document.hidden) {
                        window.open(fallbackUrl, '_blank');
                    }
                }, 1000);
                
                return true;
            };

            // Función para procesar pago con app
            const processPaymentWithApp = async (e, isUpdate = false) => {
                e.preventDefault();
                
                const metodoPago = isUpdate ? updatePaymentData.metodoPago : formData.metodoPago;
                const total = isUpdate ? appSettings.precioNumero : (appSettings.precioNumero * selectedNumbers.size);
                
                if (!metodoPago) {
                    showToast('❌ Por favor selecciona un método de pago', 'error');
                    return;
                }

                // Validar campos obligatorios para nuevo pago
                if (!isUpdate && (!formData.nombre || !formData.telefono || !formData.email)) {
                    showToast('❌ Por favor completa todos los campos obligatorios (Nombre, Teléfono y Email)', 'error');
                    return;
                }

                // Guardar datos actuales
                setCurrentPaymentData({
                    metodoPago: metodoPago,
                    numeros: isUpdate ? [selectedReservedNumber] : Array.from(selectedNumbers),
                    total: total,
                    isUpdate: isUpdate
                });

                // Abrir app de pago
                const appOpened = openPaymentApp(metodoPago, total);
                
                if (!appOpened) {
                    showToast('❌ Método de pago no válido', 'error');
                    return;
                }

                // Mostrar instrucciones
                if (!isUpdate) {
                    setShowForm(false);
                } else {
                    setShowUpdatePaymentModal(false);
                }
                setShowPaymentInstructions(true);
            };

            // Función para completar el pago después de usar la app
            const completePaymentAfterApp = async (comprobanteFile) => {
                if (!comprobanteFile) {
                    showToast('❌ Por favor sube el comprobante de pago', 'error');
                    return;
                }

                setIsUploading(true);
                
                try {
                    let ticketInfo;
                    let ticketNumber;
                    
                    if (currentPaymentData.isUpdate) {
                        // Pago desde actualización de reserva
                        ticketInfo = ticketData[selectedReservedNumber];
                        ticketNumber = ticketInfo.ticketNumber;
                    } else {
                        // Pago desde formulario nuevo
                        ticketNumber = `TK-${ticketCounter.toString().padStart(5, '0')}`;
                        ticketInfo = {
                            ...formData,
                            fecha: new Date().toLocaleString('es-CO'),
                            numeros: Array.from(selectedNumbers),
                            ticketNumber,
                            timestamp: new Date().getTime(),
                            verificadoPorAdmin: false
                        };
                    }

                    // Subir comprobante
                    const comprobanteURL = await uploadComprobante(comprobanteFile, ticketNumber);
                    
                    if (!comprobanteURL) {
                        showToast('❌ Error al subir el comprobante. Inténtalo de nuevo.', 'error');
                        return;
                    }

                    const updatedTicketInfo = {
                        ...ticketInfo,
                        estado: 'pendiente_verificacion',
                        metodoPago: currentPaymentData.metodoPago,
                        fechaPago: new Date().toLocaleString('es-CO'),
                        timestampPago: new Date().getTime(),
                        comprobanteURL: comprobanteURL,
                        verificadoPorAdmin: false
                    };

                    if (currentPaymentData.isUpdate) {
                        // Actualizar reserva existente
                        const newTicketData = { ...ticketData, [selectedReservedNumber]: updatedTicketInfo };
                        const newPendingVerification = new Set([...pendingVerificationNumbers, selectedReservedNumber]);
                        const newReserved = new Set(reservedNumbers);
                        newReserved.delete(selectedReservedNumber);

                        setTicketData(newTicketData);
                        setPendingVerificationNumbers(newPendingVerification);
                        setReservedNumbers(newReserved);

                        localStorage.setItem('rifaTicketData', JSON.stringify(newTicketData));

                        await db.collection('rifa').doc('tickets').set({ [selectedReservedNumber]: updatedTicketInfo }, { merge: true });
                        await db.collection('rifa').doc('reserved').update({ [selectedReservedNumber]: firebase.firestore.FieldValue.delete() });

                        setLastSale({
                            numero: selectedReservedNumber,
                            cliente: ticketInfo.nombre + (ticketInfo.apellido ? ' ' + ticketInfo.apellido : ''),
                            telefono: ticketInfo.telefono,
                            metodoPago: currentPaymentData.metodoPago,
                            timestamp: new Date().getTime(),
                            tipo: 'actualización_pendiente'
                        });
                    } else {
                        // Nuevo pago
                        const newTicketData = { ...ticketData };
                        const newPendingVerification = new Set([...pendingVerificationNumbers, ...selectedNumbers]);

                        selectedNumbers.forEach(num => {
                            newTicketData[num] = updatedTicketInfo;
                        });

                        setTicketData(newTicketData);
                        setPendingVerificationNumbers(newPendingVerification);
                        setSelectedNumbers(new Set());
                        setPendingNumbers(new Set());

                        localStorage.setItem('rifaTicketData', JSON.stringify(newTicketData));

                        await db.collection('rifa').doc('tickets').set(newTicketData);
                        await db.collection('rifa').doc('metadata').set({ ticketCounter: ticketCounter + 1 }, { merge: true });

                        setTicketCounter(ticketCounter + 1);

                        setLastSale({
                            numeros: Array.from(updatedTicketInfo.numeros),
                            cliente: formData.nombre + (formData.apellido ? ' ' + formData.apellido : ''),
                            telefono: formData.telefono,
                            metodoPago: currentPaymentData.metodoPago,
                            timestamp: new Date().getTime(),
                            tipo: 'pendiente_verificacion'
                        });

                        setCurrentTicket(updatedTicketInfo.numeros[0]);
                    }

                    // Notificar al cliente
                    const confirmationMessage = `🎟️ *SOLICITUD DE VERIFICACIÓN - RIFA $1.000.000* 🎟️\n\n` +
                        `¡Hola ${ticketInfo.nombre}! Hemos recibido tu comprobante de pago.\n\n` +
                        `👤 *Titular:* ${ticketInfo.nombre} ${ticketInfo.apellido || ''}\n` +
                        `🎯 *Tu${currentPaymentData.isUpdate ? ' Número' : 's Números'}:* ${currentPaymentData.isUpdate ? 
                            selectedReservedNumber.toString().padStart(3, '0') : 
                            Array.from(selectedNumbers).map(n => n.toString().padStart(3, '0')).join(', ')}\n` +
                        `🎫 *Ticket No:* ${ticketInfo.ticketNumber}\n` +
                        `📋 *Estado:* ⏳ PENDIENTE DE VERIFICACIÓN\n\n` +
                        `Tu pago será verificado por el administrador en las próximas horas.\n\n` +
                        `¡Mucha suerte! 🍀`;

                    window.open(`https://wa.me/57${ticketInfo.telefono}?text=${encodeURIComponent(confirmationMessage)}`, '_blank');

                    // Notificar al administrador
                    const adminMessage = `🔔 *NUEVA SOLICITUD DE VERIFICACIÓN* 🔔\n\n` +
                        `👤 *Cliente:* ${ticketInfo.nombre} ${ticketInfo.apellido || ''}\n` +
                        `📱 *Teléfono:* ${ticketInfo.telefono}\n` +
                        `🎯 *${currentPaymentData.isUpdate ? 'Número' : 'Números'}:* ${currentPaymentData.isUpdate ? 
                            selectedReservedNumber.toString().padStart(3, '0') : 
                            Array.from(selectedNumbers).map(n => n.toString().padStart(3, '0')).join(', ')}\n` +
                        `💰 *Método Pago:* ${currentPaymentData.metodoPago}\n` +
                        `💵 *Monto:* $${currentPaymentData.total}\n` +
                        `🕒 *Fecha:* ${new Date().toLocaleString('es-CO')}\n\n` +
                        `📎 *Comprobante:* ${comprobanteURL}\n\n` +
                        `Por favor verifica el pago en el panel de administración.`;

                    window.open(`https://wa.me/573197118858?text=${encodeURIComponent(adminMessage)}`, '_blank');

                    setShowPaymentInstructions(false);
                    setShowTicket(true);
                    showToast('✅ Comprobante enviado. El administrador verificará tu pago.', 'success', 6000);

                } catch (error) {
                    console.error('Error procesando el pago:', error);
                    showToast('❌ Error al procesar el pago. Inténtalo de nuevo.', 'error');
                } finally {
                    setIsUploading(false);
                }
            };

            // Función para verificar si una reserva ha expirado
            const isReservationExpired = (timestamp) => {
                const now = new Date().getTime();
                return now > appSettings.fechaLimitePago;
            };

            // Función para verificar y limpiar reservas expiradas
            const checkAndClearExpiredReservations = async () => {
                const now = new Date().getTime();
                if (now > appSettings.fechaLimitePago) {
                    const expired = new Set();
                    const newReservedNumbers = new Set(reservedNumbers);
                    const newTicketData = { ...ticketData };
                    
                    // Buscar reservas expiradas
                    reservedNumbers.forEach(num => {
                        const ticketInfo = ticketData[num];
                        if (ticketInfo && ticketInfo.estado === 'reservado') {
                            expired.add(num);
                            newReservedNumbers.delete(num);
                            delete newTicketData[num];
                        }
                    });
                    
                    if (expired.size > 0) {
                        setExpiredReservations(expired);
                        setReservedNumbers(newReservedNumbers);
                        setTicketData(newTicketData);
                        
                        // Actualizar Firebase
                        const reservedUpdate = {};
                        expired.forEach(num => {
                            reservedUpdate[num] = firebase.firestore.FieldValue.delete();
                        });
                        
                        await db.collection('rifa').doc('reserved').update(reservedUpdate);
                        await db.collection('rifa').doc('tickets').set(newTicketData);
                        
                        // Limpiar localStorage
                        localStorage.setItem('rifaTicketData', JSON.stringify(newTicketData));
                        
                        console.log(`Se liberaron ${expired.size} reservas expiradas`);
                    }
                }
            };

            useEffect(() => {
                loadLocalData();
                setupFirebaseListeners();
                
                // Verificar reservas expiradas cada minuto
                const interval = setInterval(() => {
                    checkAndClearExpiredReservations();
                }, 60000);
                
                return () => clearInterval(interval);
            }, []); // eslint-disable-line react-hooks/exhaustive-deps

            const loadLocalData = () => {
                try {
                    const savedSoldNumbers = localStorage.getItem('rifaSoldNumbers');
                    const savedTicketData = localStorage.getItem('rifaTicketData');
                    const savedAdmin = localStorage.getItem('rifaAdmin');
                    const savedSettings = localStorage.getItem('rifaSettings');
                    
                    if (savedSoldNumbers) setSoldNumbers(new Set(JSON.parse(savedSoldNumbers)));
                    if (savedTicketData) setTicketData(JSON.parse(savedTicketData));
                    if (savedAdmin) setIsAdmin(JSON.parse(savedAdmin));
                    if (savedSettings) {
                        const settings = JSON.parse(savedSettings);
                        if (!settings.fechaLimitePago) {
                            settings.fechaLimitePago = new Date(2024, 11, 23, 12, 0, 0).getTime();
                        }
                        setAppSettings(settings);
                    }
                } catch (err) {
                    console.error('Error leyendo localStorage, limpiando datos corruptos:', err);
                    localStorage.removeItem('rifaSoldNumbers');
                    localStorage.removeItem('rifaTicketData');
                    localStorage.removeItem('rifaSettings');
                } finally {
                    setIsLoading(false);
                }
                checkAndClearExpiredReservations();
            };

            const setupFirebaseListeners = () => {
                db.collection('rifa').doc('numbers')
                    .onSnapshot((doc) => {
                        const data = doc.data() || {};
                        const soldSet = new Set(Object.keys(data).map(Number));
                        setSoldNumbers(soldSet);
                        setSyncStatus('🟢 CONECTADO - Tiempo Real');
                        setIsLoading(false);
                    }, (error) => {
                        setSyncStatus('🔴 Sin conexión - Modo local');
                        setIsLoading(false);
                        console.error('Firebase error:', error);
                    });

                db.collection('rifa').doc('tickets')
                    .onSnapshot((doc) => {
                        const data = doc.data() || {};
                        setTicketData(data);
                        const pending = new Set();
                        Object.entries(data).forEach(([numero, ticketInfo]) => {
                            if (ticketInfo.estado === 'pendiente_verificacion') {
                                pending.add(parseInt(numero));
                            }
                        });
                        setPendingVerificationNumbers(pending);
                    }, (error) => console.error('Error tickets snapshot:', error));

                db.collection('rifa').doc('reserved')
                    .onSnapshot((doc) => {
                        const data = doc.data() || {};
                        setReservedNumbers(new Set(Object.keys(data).map(Number)));
                    }, (error) => console.error('Error reserved snapshot:', error));

                db.collection('rifa').doc('draw')
                    .onSnapshot((doc) => {
                        const data = doc.data() || {};
                        if (data.winner !== undefined) {
                            setWinnerNumber(data.winner);
                            setDrawExecuted(true);
                        }
                    }, (error) => console.error('Error draw snapshot:', error));

                db.collection('rifa').doc('metadata')
                    .onSnapshot((doc) => {
                        const data = doc.data() || {};
                        if (data.ticketCounter !== undefined) {
                            setTicketCounter(data.ticketCounter);
                        }
                    }, (error) => console.error('Error metadata snapshot:', error));

                        ticket.email || '',
                        estado,

                        ticket.verificadoPorAdmin ? '✅' : '❌'

                                    <div className={`grid gap-3 ${
                                        currentTicket && ticketData[currentTicket] && ticketData[currentTicket].estado === 'reservado' 
                                        ? 'grid-cols-2 sm:grid-cols-4' 
                                        : 'grid-cols-1 sm:grid-cols-3'
                                    }`}>
                                        {/* Botón de PAGAR - Solo aparece para reservados */}
                                        {currentTicket && ticketData[currentTicket] && ticketData[currentTicket].estado === 'reservado' && (
                                            <button
                                                onClick={openPaymentFromTicket}
                                                className="bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-bold transition-all duration-200"
                                            >
                                                💳 Pagar
                                            </button>
                                        )}
                                        
                                        <button
                                            onClick={downloadTicketImage}
                                            className="bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-xl font-bold transition-all duration-200"
                                        >
                                            💾 Descargar
                                        </button>
                                        <button
                                            onClick={shareClientTicket}
                                            className="bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl font-bold transition-all duration-200"
                                        >
                                            📤 Compartir
                                        </button>
                                        <button
                                            onClick={() => setShowTicket(false)}
                                            className="bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-bold transition-all duration-200"
                                        >
                                            ❌ Cerrar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── MODAL SORTEO ── */}
                    {showDrawPanel && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-gradient-to-br from-purple-900 to-indigo-900 rounded-2xl p-6 w-full max-w-md border border-white/20 shadow-2xl modal-scroll">
                                <h2 className="text-2xl font-bold text-white mb-4 text-center">🎲 Realizar Sorteo</h2>

                                {drawExecuted && winnerNumber !== null ? (
                                    <div className="text-center">
                                        <div className="bg-yellow-500/20 border border-yellow-400/50 rounded-2xl p-6 mb-4">
                                            <p className="text-white/80 mb-2">🏆 Número Ganador</p>
                                            <p className="text-yellow-400 font-bold text-6xl">{winnerNumber.toString().padStart(3,'0')}</p>
                                        </div>
                                        {ticketData[winnerNumber] && (
                                            <div className="bg-white/10 rounded-xl p-4 mb-4 text-left">
                                                <p className="text-white font-bold">👤 Ganador: {ticketData[winnerNumber].nombre} {ticketData[winnerNumber].apellido || ''}</p>
                                                <p className="text-white/80 text-sm">📱 {ticketData[winnerNumber].telefono}</p>
                                                <p className="text-white/80 text-sm">🎫 {ticketData[winnerNumber].ticketNumber}</p>
                                            </div>
                                        )}
                                        <button onClick={() => setShowDrawPanel(false)}
                                            className="w-full bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-xl font-bold transition-all">
                                            Cerrar
                                        </button>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="bg-white/10 rounded-xl p-4 mb-4 text-center">
                                            <p className="text-white/80 text-sm mb-1">Números vendidos disponibles</p>
                                            <p className="text-white font-bold text-3xl">{soldNumbers.size}</p>
                                        </div>
                                        {winnerNumber !== null && (
                                            <div className="text-center mb-4">
                                                <p className="text-yellow-400 font-bold text-5xl animate-pulse">
                                                    {winnerNumber.toString().padStart(3,'0')}
                                                </p>
                                            </div>
                                        )}
                                        <div className="flex gap-3">
                                            <button onClick={executeDraw}
                                                disabled={soldNumbers.size === 0}
                                                className="flex-1 bg-green-500 hover:bg-green-600 disabled:bg-gray-500 disabled:cursor-not-allowed text-white py-3 rounded-xl font-bold transition-all">
                                                🎲 ¡Sortear!
                                            </button>
                                            <button onClick={() => setShowDrawPanel(false)}
                                                className="flex-1 bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-bold transition-all">
                                                ❌ Cerrar
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ── MODAL LIMPIAR DATOS ── */}
                    {showClearDataModal && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-gradient-to-br from-red-900 to-gray-900 rounded-2xl p-6 w-full max-w-md border border-red-400/30 shadow-2xl modal-scroll">
                                <h2 className="text-2xl font-bold text-white mb-2 text-center">🗑️ Limpiar Todos los Datos</h2>
                                <p className="text-red-300 text-sm text-center mb-4">⚠️ Esta acción borrará TODOS los tickets, números y reservas. Es irreversible.</p>

                                <div className="bg-black/30 rounded-xl p-4 mb-4 text-sm text-white/80 space-y-1">
                                    <p>• Números pagados: <span className="font-bold text-white">{soldNumbers.size}</span></p>
                                    <p>• Números reservados: <span className="font-bold text-white">{reservedNumbers.size}</span></p>
                                    <p>• Pendientes verificación: <span className="font-bold text-white">{pendingVerificationNumbers.size}</span></p>
                                    <p>• Total tickets: <span className="font-bold text-white">{Object.keys(ticketData).length}</span></p>
                                </div>

                                <form onSubmit={clearAllData}>
                                    <div className="mb-4">
                                        <label className="text-white text-sm font-medium block mb-2">
                                            Escribe <span className="text-red-400 font-bold">CONFIRMAR</span> para proceder:
                                        </label>
                                        <input
                                            type="text"
                                            value={clearDataConfirmation}
                                            onChange={e => setClearDataConfirmation(e.target.value)}
                                            placeholder="CONFIRMAR"
                                            className="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-red-500"
                                        />
                                    </div>
                                    <div className="flex gap-3">
                                        <button type="submit"
                                            disabled={clearDataConfirmation !== 'CONFIRMAR'}
                                            className="flex-1 bg-red-600 hover:bg-red-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white py-3 rounded-xl font-bold transition-all">
                                            🗑️ Limpiar Todo
                                        </button>
                                        <button type="button" onClick={() => setShowClearDataModal(false)}
                                            className="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-3 rounded-xl font-bold transition-all">
                                            Cancelar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ── MODAL CONFIGURACIÓN ── */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-gradient-to-br from-indigo-900 to-purple-900 rounded-2xl p-6 w-full max-w-md border border-white/20 shadow-2xl modal-scroll">
                                <h2 className="text-2xl font-bold text-white mb-4 text-center">⚙️ Configuración</h2>
                                <form onSubmit={saveSettings} className="space-y-4">
                                    <div>
                                        <label className="text-white text-sm font-medium block mb-1">Nombre del Sorteo / Lotería</label>
                                        <input
                                            type="text"
                                            value={appSettings.loteria}
                                            onChange={e => setAppSettings(prev => ({ ...prev, loteria: e.target.value }))}
                                            className="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                            placeholder="Ej: Chance Pick 3 Noche"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-white text-sm font-medium block mb-1">Fecha del Sorteo (texto)</label>
                                        <input
                                            type="text"
                                            value={appSettings.fechaSorteo}
                                            onChange={e => setAppSettings(prev => ({ ...prev, fechaSorteo: e.target.value }))}
                                            className="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                            placeholder="Ej: 23 de Diciembre"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-white text-sm font-medium block mb-1">Precio por número (COP)</label>
                                        <input
                                            type="number"
                                            min="1000"
                                            step="1000"
                                            value={appSettings.precioNumero}
                                            onChange={e => setAppSettings(prev => ({ ...prev, precioNumero: parseInt(e.target.value) || 0 }))}
                                            className="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                        <p className="text-white/50 text-xs mt-1">= ${(appSettings.precioNumero || 0).toLocaleString('es-CO')} COP</p>
                                    </div>
                                    <div>
                                        <label className="text-white text-sm font-medium block mb-1">Fecha límite de pago</label>
                                        <input
                                            type="datetime-local"
                                            value={appSettings.fechaLimitePago ? new Date(appSettings.fechaLimitePago - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16) : ''}
                                            onChange={e => setAppSettings(prev => ({ ...prev, fechaLimitePago: new Date(e.target.value).getTime() }))}
                                            className="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                        />
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button type="submit"
                                            className="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl font-bold transition-all">
                                            💾 Guardar
                                        </button>
                                        <button type="button" onClick={() => setShowSettingsModal(false)}
                                            className="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-3 rounded-xl font-bold transition-all">
                                            Cancelar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<TalonarioRifa />, document.getElementById('app'));
    </script>
</body>
</html>
